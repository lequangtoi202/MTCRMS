services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mtcrms-backend-api
    env_file:
      - .env
    ports:
      - '${PORT:-3000}:3000'
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    container_name: mtcrms-backend-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ${DB_NAME:-mtcrms}
      MYSQL_USER: ${DB_USERNAME:-mtcrms}
      MYSQL_PASSWORD: ${DB_PASSWORD:-mtcrms}
    ports:
      - '${DB_PUBLIC_PORT:-3307}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mtcrms-backend-redis
    ports:
      - '${REDIS_PUBLIC_PORT:-6380}:6379'
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
